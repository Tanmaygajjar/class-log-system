<!DOCTYPE html>
<html>
<head>

<title>Class Log System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#F5F6F7;
font-family:Arial;
}

.card{
background:#F0EDE5;
border:none;
border-radius:10px;
}

h3{
color:#004643;
font-weight:bold;
}

.btn-primary{
background:#004643;
border:none;
}

.btn-primary:hover{
background:#003532;
}

</style>

</head>

<body>

<div class="container">

<div class="row justify-content-center mt-5">

<div class="col-md-4">

<div class="card shadow">

<div class="card-body">

<h3 class="text-center mb-4">Staff Login</h3>

<form method="POST">

<input class="form-control mb-3" name="name" placeholder="Name" required>

<input class="form-control mb-3" type="password" name="password" placeholder="Password" required>

<button class="btn btn-primary w-100">Login</button>

</form>

</div>

</div>

</div>

</div>

</div>

</body>
</html>
