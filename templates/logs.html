<!DOCTYPE html>
<html>
<head>

<title>Logs</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#F5F6F7;
font-family:Arial;
}

h3{
color:#004643;
}

.table thead{
background:#004643;
color:white;
}

</style>

</head>

<body>

<div class="container mt-5">

<h3 class="mb-4">Staff Logs</h3>

<table class="table table-bordered table-striped">

<thead>

<tr>
<th>Name</th>
<th>Date</th>
<th>Entry</th>
<th>Exit</th>
<th>Work Done</th>
</tr>

</thead>

<tbody>

{% for row in data %}

<tr>
<td>{{row[0]}}</td>
<td>{{row[1]}}</td>
<td>{{row[2]}}</td>
<td>{{row[3]}}</td>
<td>{{row[4]}}</td>
</tr>

{% endfor %}

</tbody>

</table>

</div>

</body>
</html>
